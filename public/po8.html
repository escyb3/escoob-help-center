<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escoob Elite v6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        .dark { --primary: #60a5fa; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; transition: all 0.3s ease; margin: 0; }
        .glass-card { background: var(--card); border: 1px solid rgba(0,0,0,0.05); }
        .nav-link.active { background-color: var(--primary); color: white !important; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 1rem; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Toast -->
    <div id="toast" class="toast bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
        <span id="toast-icon">✨</span>
        <span id="toast-msg"></span>
    </div>

    <!-- Simple Loading State -->
    <div id="loading-overlay" class="fixed inset-0 bg-white dark:bg-slate-900 flex items-center justify-center z-[100]">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold loading-dots">מתחבר למערכת</p>
        </div>
    </div>

    <div id="app-container" class="hidden flex flex-col lg:flex-row min-h-screen">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 right-0 w-72 glass-card border-l z-40 transition-transform lg:translate-x-0 translate-x-full">
            <div class="p-8 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">E</div>
                <span class="text-2xl font-black">Escoob</span>
            </div>
            
            <nav class="p-4 space-y-1" id="nav-list"></nav>

            <div class="absolute bottom-0 w-full p-6 space-y-4">
                <div class="p-4 rounded-2xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">🪙</span>
                        <span class="font-black text-amber-600" id="user-points">0</span>
                    </div>
                </div>
                <div class="flex items-center gap-3 p-2">
                    <div id="user-avatar" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">?</div>
                    <div class="flex-1 overflow-hidden">
                        <p id="user-name-sidebar" class="font-bold truncate text-sm">טוען...</p>
                        <p id="user-role-label" class="text-[10px] opacity-50 font-bold uppercase">סטודנט</p>
                    </div>
                </div>
                <button id="logout-button" class="w-full py-3 text-red-500 font-bold text-sm hover:bg-red-50 rounded-xl">יציאה</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:mr-72 p-4 lg:p-8">
            <header class="mb-8 flex justify-between items-center lg:hidden">
                <div class="font-black text-xl">Escoob</div>
                <button id="mobile-menu-toggle" class="p-2">☰</button>
            </header>

            <div class="max-w-5xl mx-auto space-y-8">
                <div id="header-section">
                    <h1 id="page-title" class="text-4xl font-black tracking-tight">הלוח שלי</h1>
                </div>

                <!-- Dashboard -->
                <section id="dashboard" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="glass-card p-6 rounded-[2rem]">
                            <h3 class="font-bold mb-4 flex items-center gap-2">🚀 פעולות מהירות</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="window.switchTab('attendance')" class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl text-center hover:bg-blue-100 transition-all">
                                    <div class="text-2xl mb-1">📍</div>
                                    <div class="text-sm font-bold text-blue-600">דיווח נוכחות</div>
                                </button>
                                <button onclick="window.switchTab('shop')" class="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-2xl text-center hover:bg-amber-100 transition-all">
                                    <div class="text-2xl mb-1">🎁</div>
                                    <div class="text-sm font-bold text-amber-600">חנות בונוסים</div>
                                </button>
                            </div>
                        </div>
                        <div id="materials-list" class="space-y-4"></div>
                    </div>
                    <div class="glass-card rounded-[2rem] h-[500px] flex flex-col overflow-hidden">
                        <div class="p-4 border-b font-bold">צ'אט כיתתי</div>
                        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>
                        <form id="chat-form" class="p-3 border-t flex gap-2">
                            <input type="text" id="chat-input" placeholder="הודעה..." class="flex-1 p-2 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none">
                            <button class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold">></button>
                        </form>
                    </div>
                </section>

                <!-- Attendance (QR) -->
                <section id="attendance" class="tab-content hidden text-center space-y-6">
                    <div class="glass-card p-8 rounded-[2.5rem] max-w-md mx-auto">
                        <h3 class="text-2xl font-black mb-2">דיווח נוכחות חכם</h3>
                        <p class="text-sm opacity-60 mb-8">סרוק את הקוד בכיתה כדי לקבל נקודות נוכחות</p>
                        <div id="qrcode" class="mb-8"></div>
                        <div id="attendance-status" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold">
                            ממתין לסריקה...
                        </div>
                    </div>
                </section>

                <!-- Shop -->
                <section id="shop" class="tab-content hidden grid grid-cols-1 md:grid-cols-3 gap-6" id="shop-items-container"></section>

                <!-- Admin Panel -->
                <section id="admin-panel" class="tab-content hidden space-y-6">
                    <div class="glass-card p-6 rounded-[2rem]">
                        <h3 class="text-xl font-bold mb-4">ניהול תלמידים</h3>
                        <div id="admin-controls" class="space-y-4">
                            <select id="student-selector" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl"></select>
                            <div class="flex gap-2">
                                <input type="number" id="points-to-add" placeholder="כמות נקודות" class="flex-1 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl">
                                <button onclick="window.adminAddPoints()" class="bg-amber-500 text-white px-6 py-3 rounded-xl font-bold">הוסף 🪙</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDxskoU67b71cr_idv79DLHX3PgvvwW4UM","authDomain":"escoobportal.firebaseapp.com","projectId":"escoobportal","storageBucket":"escoobportal.firebasestorage.app","messagingSenderId":"249473201330","appId":"1:249473201330:web:7a4ba82e67d654324b45ab"}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "escoob-v6-1";

        let currentUserData = null;

        async function start() {
            try {
                // Auth Handling
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                        const snap = await getDoc(userRef);
                        
                        if (!snap.exists()) {
                            const defaultData = {
                                uid: user.uid,
                                name: "משתמש " + user.uid.slice(0,4),
                                role: 'student',
                                points: 100,
                                joined: serverTimestamp()
                            };
                            await setDoc(userRef, defaultData);
                            currentUserData = defaultData;
                        }

                        onSnapshot(userRef, (s) => {
                            currentUserData = { ...user, ...s.data() };
                            updateUI();
                        });

                        setupListeners();
                        document.getElementById('loading-overlay').classList.add('hidden');
                        document.getElementById('app-container').classList.remove('hidden');
                        switchTab('dashboard');
                    }
                });
            } catch (e) {
                console.error(e);
                document.querySelector('.loading-dots').textContent = "שגיאת חיבור. נסה לרענן.";
            }
        }

        function updateUI() {
            if (!currentUserData) return;
            document.getElementById('user-name-sidebar').textContent = currentUserData.name;
            document.getElementById('user-avatar').textContent = currentUserData.name[0];
            document.getElementById('user-points').textContent = currentUserData.points || 0;
            document.getElementById('user-role-label').textContent = currentUserData.role === 'teacher' ? 'סגל' : 'תלמיד';
            renderNav();
        }

        function renderNav() {
            const navs = [
                { id: 'dashboard', label: 'הלוח שלי', icon: '🏠' },
                { id: 'attendance', label: 'נוכחות QR', icon: '📍' },
                { id: 'shop', label: 'חנות', icon: '🛍️' },
                { id: 'admin-panel', label: 'ניהול', icon: '⚙️', admin: true }
            ];
            document.getElementById('nav-list').innerHTML = navs
                .filter(n => !n.admin || currentUserData.role === 'teacher')
                .map(n => `
                    <button onclick="window.switchTab('${n.id}')" data-tab="${n.id}" class="nav-link w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
                        <span>${n.icon}</span> ${n.label}
                    </button>
                `).join('');
        }

        function setupListeners() {
            // Chat
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), (snap) => {
                const container = document.getElementById('chat-messages');
                let msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.at?.seconds || 0) - (b.at?.seconds || 0));
                container.innerHTML = msgs.slice(-30).map(m => `
                    <div class="${m.uid === auth.currentUser.uid ? 'text-left' : 'text-right'}">
                        <div class="inline-block px-3 py-2 rounded-xl ${m.uid === auth.currentUser.uid ? 'bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800'}">
                            ${m.text}
                        </div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            });

            // Admin Student List
            if (currentUserData.role === 'teacher') {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                    const sel = document.getElementById('student-selector');
                    sel.innerHTML = '<option value="">בחר תלמיד...</option>';
                    snap.forEach(d => {
                        const u = d.data();
                        if (u.role === 'student') sel.innerHTML += `<option value="${u.uid}">${u.name}</option>`;
                    });
                });
            }

            // Shop Generation
            const items = [
                { id: 'b1', name: 'בונוס למבחן', price: 250, icon: '📝' },
                { id: 'b2', name: 'דילוג על מטלה', price: 400, icon: '⏭️' },
                { id: 'b3', name: 'יום חופש', price: 1000, icon: '🏖️' }
            ];
            document.getElementById('shop').innerHTML = items.map(i => `
                <div class="glass-card p-6 rounded-[2rem] text-center space-y-4">
                    <div class="text-4xl">${i.icon}</div>
                    <h4 class="font-bold">${i.name}</h4>
                    <button onclick="window.buyItem('${i.id}', ${i.price})" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">${i.price} 🪙</button>
                </div>
            `).join('');
        }

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
            
            if (id === 'attendance') {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: `https://escoob.org/checkin?uid=${auth.currentUser.uid}&ts=${Date.now()}`,
                    width: 200, height: 200
                });
            }
        };

        window.buyItem = async (id, price) => {
            if (currentUserData.points < price) return showToast("אין לך מספיק נקודות!", "⚠️");
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', auth.currentUser.uid);
            await updateDoc(userRef, { points: increment(-price) });
            showToast("רכישה הצליחה!", "🎁");
        };

        window.adminAddPoints = async () => {
            const sid = document.getElementById('student-selector').value;
            const pts = parseInt(document.getElementById('points-to-add').value);
            if (!sid || !pts) return;
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', sid);
            await updateDoc(userRef, { points: increment(pts) });
            showToast("נקודות עודכנו!", "✅");
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('chat-input').value;
            if (!val) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), {
                text: val, uid: auth.currentUser.uid, at: serverTimestamp()
            });
            document.getElementById('chat-input').value = "";
        };

        function showToast(msg, icon) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').textContent = icon;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = start;
        document.getElementById('mobile-menu-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('translate-x-full');
        document.getElementById('logout-button').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
