<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies Archive - Help Center</title>
  
  <style>
    /* Global Page Styling */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #141414; /* Sleek dark theme suitable for a movie site */
      color: #ffffff;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }

    /* Typography fixes */
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #e50914; /* Movie-themed red accent */
    }

    p {
      font-size: 16px;
      color: #cccccc;
      margin-bottom: 24px;
    }

    .sub-text {
      font-size: 14px;
      color: #aaaaaa;
      margin-bottom: 12px;
      display: block; /* Ensures it sits on its own line */
    }

    /* Refined Button Styling */
    .small-contact-btn {
      display: inline-block;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      background-color: #e50914; /* Red theme color */
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    /* Hover and Click effects */
    .small-contact-btn:hover {
      background-color: #b81d24;
    }
    
    .small-contact-btn:active {
      transform: scale(0.98); /* Slight click feedback */
    }
  </style>
</head>
<body>

  <h1>Hello and welcome to Movies Archive's help center</h1>
  <p>Here you will be able to get your questions answered.</p>

  <span class="sub-text">Still didn't get answers to your questions?</span>
  <a href="mailto:x@escoob.com" class="small-contact-btn">Contact Us</a>

</body>
</html>
