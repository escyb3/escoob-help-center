<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורטל Escoob - ניהול מלא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-primary': '#2563eb',
                        'brand-teacher': '#8b5cf6',
                        'brand-manager': '#dc2626',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Assistant', sans-serif; }
        .nav-link.active {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }
        .teacher-mode .nav-link.active {
            background-color: #f5f3ff;
            color: #8b5cf6;
            border-right-color: #8b5cf6;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center z-[100]">
        <div id="login-screen" class="w-full max-w-md p-8 bg-white rounded-3xl shadow-2xl border border-slate-100">
            <h2 class="text-3xl font-black text-center mb-6">כניסה לפורטל</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" required class="w-full px-5 py-3 rounded-xl border border-slate-200 outline-none" placeholder="דוא״ל (למשל: bella@escoob.org)">
                <input type="password" id="password" required class="w-full px-5 py-3 rounded-xl border border-slate-200 outline-none" placeholder="סיסמה">
                <button type="submit" class="w-full bg-brand-primary text-white font-bold py-4 rounded-xl shadow-lg">התחברות</button>
            </form>
            <p class="text-xs text-center mt-4 text-slate-400">שימו לב: הגישה לניהול היא למורים מוגדרים בלבד</p>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="app-container" class="hidden flex h-screen">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-l border-slate-200 flex flex-col">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-brand-primary rounded-lg flex items-center justify-center text-white font-bold">E</div>
                    <span class="text-xl font-black tracking-tighter">Escoob</span>
                </div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1" id="nav-list">
                <!-- Nav items injected here -->
            </nav>

            <div class="p-4 border-t border-slate-100">
                <button id="logout-button" class="w-full flex items-center gap-2 text-slate-400 hover:text-red-500 font-bold p-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    יציאה
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 id="page-title" class="text-3xl font-black text-slate-900">לוח בקרה</h1>
                    <p id="page-desc" class="text-slate-500">שלום, <span id="user-name-header">טוען...</span></p>
                </div>
                <div id="role-badge" class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-xs font-black uppercase">סטודנט</div>
            </header>

            <!-- Dashboard / Announcements -->
            <section id="dashboard" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl shadow-blue-100">
                        <h3 class="font-bold opacity-80 text-xs mb-2">ממוצע נוכחי</h3>
                        <div class="text-3xl font-black">--</div>
                    </div>
                    <div class="bg-purple-600 p-6 rounded-3xl text-white shadow-xl shadow-purple-100">
                        <h3 class="font-bold opacity-80 text-xs mb-2">משימות פתוחות</h3>
                        <div class="text-3xl font-black">--</div>
                    </div>
                    <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-xl shadow-emerald-100">
                        <h3 class="font-bold opacity-80 text-xs mb-2">שיעור הבא</h3>
                        <div class="text-xl font-black">מתמטיקה - 10:00</div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                    <h3 class="font-black text-xl mb-6">הודעות ועדכונים</h3>
                    <div id="announcements-list" class="space-y-4">
                        <div class="p-4 bg-slate-50 rounded-2xl border-r-4 border-brand-primary">
                            <p class="font-bold">ברוכים הבאים לפורטל החדש!</p>
                            <p class="text-xs text-slate-500">צוות Escoob</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Subjects & Content -->
            <section id="subjects" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="materials-container">
                    <!-- Materials list -->
                </div>
            </section>

            <!-- Grades List -->
            <section id="grades" class="tab-content hidden">
                <div class="bg-white rounded-3xl overflow-hidden border border-slate-100">
                    <table class="w-full text-right">
                        <thead class="bg-slate-50 text-xs font-black text-slate-400">
                            <tr>
                                <th class="px-6 py-4">מקצוע</th>
                                <th class="px-6 py-4">ציון</th>
                                <th class="px-6 py-4">מורה</th>
                                <th class="px-6 py-4">תאריך</th>
                            </tr>
                        </thead>
                        <tbody id="grades-table-body" class="divide-y divide-slate-50">
                            <!-- Grades injected here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- TEACHER PANEL -->
            <section id="admin-panel" class="tab-content hidden space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Form 1: Grades -->
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="font-black text-xl mb-6 text-brand-primary">הזנת ציונים</h3>
                        <form id="grade-form" class="space-y-4">
                            <select id="student-select" required class="w-full p-4 bg-slate-50 rounded-xl border-none font-bold">
                                <option value="">בחר תלמיד...</option>
                            </select>
                            <input type="text" id="grade-subject" placeholder="שם המקצוע" required class="w-full p-4 bg-slate-50 rounded-xl border-none">
                            <input type="number" id="grade-value" placeholder="ציון (0-100)" required class="w-full p-4 bg-slate-50 rounded-xl border-none">
                            <button type="submit" class="w-full bg-brand-primary text-white font-bold py-3 rounded-xl">שמור ציון</button>
                        </form>
                    </div>

                    <!-- Form 2: Content -->
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="font-black text-xl mb-6 text-brand-teacher">פרסום חומר לימוד</h3>
                        <form id="material-form" class="space-y-4">
                            <input type="text" id="material-title" placeholder="כותרת השיעור" required class="w-full p-4 bg-slate-50 rounded-xl border-none">
                            <textarea id="material-body" placeholder="תוכן השיעור או הודעה..." rows="4" required class="w-full p-4 bg-slate-50 rounded-xl border-none"></textarea>
                            <button type="submit" class="w-full bg-brand-teacher text-white font-bold py-3 rounded-xl">פרסם תוכן</button>
                        </form>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxskoU67b71cr_idv79DLHX3PgvvwW4UM",
            authDomain: "escoobportal.firebaseapp.com",
            projectId: "escoobportal",
            storageBucket: "escoobportal.firebasestorage.app",
            messagingSenderId: "249473201330",
            appId: "1:249473201330:web:7a4ba82e67d654324b45ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "escoob-main-v3";

        // רשימת צוות מוגדרת מראש
        const STAFF_LIST = {
            'bella@escoob.org': { name: 'בלה גאפוש', role: 'teacher' },
            'plays@escoob.org': { name: 'הצגות', role: 'teacher' },
            'yair@escoob.org': { name: 'יאיר אנדיו', role: 'teacher' },
            'avishai@escoob.org': { name: 'אבישי אנדיו', role: 'teacher' },
            'manager@escoob.org': { name: 'מנהל מערכת', role: 'manager' },
            'general@escoob.org': { name: 'מורה כללי', role: 'teacher' }
        };

        let userState = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    userState = snap.data();
                } else {
                    const staffData = STAFF_LIST[user.email.toLowerCase()];
                    userState = {
                        uid: user.uid,
                        email: user.email,
                        name: staffData ? staffData.name : user.email.split('@')[0],
                        role: staffData ? staffData.role : 'student'
                    };
                    await setDoc(userRef, userState);
                }
                setupUI();
            } else {
                document.getElementById('loading-overlay').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        function setupUI() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-name-header').textContent = userState.name;
            
            const badge = document.getElementById('role-badge');
            badge.textContent = userState.role === 'teacher' ? 'צוות הוראה' : (userState.role === 'manager' ? 'ניהול' : 'תלמיד');
            if(userState.role !== 'student') {
                document.body.classList.add('teacher-mode');
                badge.classList.replace('bg-slate-100', 'bg-purple-100');
                badge.classList.replace('text-slate-500', 'text-purple-600');
            }

            renderNav();
            loadLiveContent();
        }

        function renderNav() {
            const nav = document.getElementById('nav-list');
            const items = [
                { id: 'dashboard', label: 'לוח בקרה', show: true },
                { id: 'subjects', label: 'חומרי לימוד', show: true },
                { id: 'grades', label: 'ציונים שלי', show: userState.role === 'student' },
                { id: 'admin-panel', label: 'פאנל מורים', show: userState.role !== 'student' }
            ];

            nav.innerHTML = items.filter(i => i.show).map(i => `
                <button onclick="window.switchTab('${i.id}')" data-tab="${i.id}" class="nav-link w-full text-right p-3 rounded-xl font-bold text-slate-500 transition-all">
                    ${i.label}
                </button>
            `).join('');

            window.switchTab('dashboard');
        }

        function loadLiveContent() {
            // טעינת חומרי לימוד
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), (snap) => {
                const container = document.getElementById('materials-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <span class="text-[10px] font-black text-purple-500 uppercase">${m.author}</span>
                            <h4 class="font-bold text-lg mb-2">${m.title}</h4>
                            <p class="text-sm text-slate-500">${m.body}</p>
                        </div>
                    `;
                });
            });

            // טעינת ציונים
            const gradesRef = collection(db, 'artifacts', appId, 'public', 'data', 'grades');
            const q = userState.role === 'student' 
                ? query(gradesRef, where("studentId", "==", userState.uid)) 
                : gradesRef;

            onSnapshot(q, (snap) => {
                const table = document.getElementById('grades-table-body');
                table.innerHTML = '';
                snap.forEach(doc => {
                    const g = doc.data();
                    table.innerHTML += `
                        <tr>
                            <td class="px-6 py-4 font-bold">${g.subject}</td>
                            <td class="px-6 py-4"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-black">${g.grade}</span></td>
                            <td class="px-6 py-4 text-sm text-slate-400">${g.teacherName}</td>
                            <td class="px-6 py-4 text-xs text-slate-300">${g.createdAt ? new Date(g.createdAt.seconds*1000).toLocaleDateString('he-IL') : '--'}</td>
                        </tr>
                    `;
                });
            });

            // טעינת תלמידים לרשימה
            if(userState.role !== 'student') {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                    const select = document.getElementById('student-select');
                    select.innerHTML = '<option value="">בחר תלמיד...</option>';
                    snap.forEach(doc => {
                        const u = doc.data();
                        if(u.role === 'student') select.innerHTML += `<option value="${u.uid}">${u.name}</option>`;
                    });
                });
            }
        }

        // טפסים
        document.getElementById('grade-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'grades'), {
                studentId: document.getElementById('student-select').value,
                subject: document.getElementById('grade-subject').value,
                grade: document.getElementById('grade-value').value,
                teacherName: userState.name,
                createdAt: serverTimestamp()
            });
            e.target.reset();
        };

        document.getElementById('material-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), {
                title: document.getElementById('material-title').value,
                body: document.getElementById('material-body').value,
                author: userState.name,
                createdAt: serverTimestamp()
            });
            e.target.reset();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.querySelector(`[data-tab="${id}"]`).classList.add('active');
            
            const titles = { dashboard: 'לוח בקרה', subjects: 'חומרי לימוד', grades: 'ציונים שלי', 'admin-panel': 'ניהול פורטל' };
            document.getElementById('page-title').textContent = titles[id];
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) { alert('פרטים שגויים'); }
        };

        document.getElementById('logout-button').onclick = () => signOut(auth);

    </script>
</body>
</html>
