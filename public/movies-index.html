
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineKeep - Movies Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .movie-card:hover .play-overlay { opacity: 1; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .admin-glow { box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .hidden-admin { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'moviesindex-77167';
    const firebaseConfig = {
        apiKey: "AIzaSyCTVMOE5n3CHM7sSRKxiko4KCq4bN6JNCA",
        authDomain: "moviesindex-77167.firebaseapp.com",
        projectId: "moviesindex-77167",
        storageBucket: "moviesindex-77167.firebasestorage.app",
        messagingSenderId: "279435298051",
        appId: "1:279435298051:web:a5e21495c6bd68538f9536",
        measurementId: "G-6TL2Z3SR20"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const state = {
        movies: [],
        filteredMovies: [],
        currentUser: null,
        isAdmin: sessionStorage.getItem('isAdmin') === 'true',
        loading: true,
        searchQuery: '',
        genreFilter: 'All',
        adminPassword: 'admin1234' // Change this to your preferred password
    };

    const movieGrid = document.getElementById('movie-grid');
    const movieCount = document.getElementById('movie-count');
    const searchInput = document.getElementById('search-input');
    const genreSelect = document.getElementById('genre-filter');
    const addMovieModal = document.getElementById('add-movie-modal');
    const loginModal = document.getElementById('login-modal');
    const requestModal = document.getElementById('request-modal');
    const movieForm = document.getElementById('movie-form');
    const loadingOverlay = document.getElementById('loading-overlay');
    const feedbackMsg = document.getElementById('feedback-message');
    const adminControls = document.querySelectorAll('.admin-only');

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined') {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            updateAdminUI();
        } catch (error) {
            console.error("Auth Error:", error);
            showFeedback("Connection failed.", "error");
        }
    };

    onAuthStateChanged(auth, (user) => {
        state.currentUser = user;
        if (user) subscribeToMovies();
    });

    const updateAdminUI = () => {
        const loginBtn = document.getElementById('login-nav-btn');
        const addBtn = document.getElementById('add-movie-nav-btn');
        
        if (state.isAdmin) {
            loginBtn.innerHTML = '<i class="fa-solid fa-lock-open mr-2"></i>Logout';
            loginBtn.classList.add('bg-indigo-50', 'text-indigo-600');
            addBtn.classList.remove('hidden');
        } else {
            loginBtn.innerHTML = '<i class="fa-solid fa-lock mr-2"></i>Admin Login';
            loginBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
            addBtn.classList.add('hidden');
        }
        renderMovies(); // Re-render to show/hide delete buttons
    };

    const subscribeToMovies = () => {
        if (!state.currentUser) return;
        const moviesCol = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
        
        onSnapshot(moviesCol, (snapshot) => {
            state.movies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            state.loading = false;
            loadingOverlay.classList.add('hidden');
            applyFilters();
        }, (error) => {
            console.error("Firestore Error:", error);
            showFeedback("Load failed.", "error");
        });
    };

    const applyFilters = () => {
        let filtered = [...state.movies];
        if (state.searchQuery) {
            const query = state.searchQuery.toLowerCase();
            filtered = filtered.filter(m => m.title.toLowerCase().includes(query) || m.genre.toLowerCase().includes(query));
        }
        if (state.genreFilter !== 'All') {
            filtered = filtered.filter(m => m.genre === state.genreFilter);
        }
        state.filteredMovies = filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        renderMovies();
    };

    const renderMovies = () => {
        movieCount.textContent = `${state.filteredMovies.length} Movies`;
        
        if (state.filteredMovies.length === 0) {
            movieGrid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">No movies found.</div>`;
            return;
        }

        movieGrid.innerHTML = state.filteredMovies.map(movie => `
            <div class="movie-card bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden transition-all hover:shadow-lg">
                <div class="relative aspect-[2/3] bg-slate-200">
                    <img src="${movie.posterUrl || 'https://placehold.co/400x600/1e293b/ffffff?text=' + encodeURIComponent(movie.title)}" 
                         class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x600/1e293b/ffffff?text=Poster'">
                    <div class="play-overlay absolute inset-0 bg-black/40 opacity-0 transition-opacity flex items-center justify-center">
                        ${movie.driveLink ? `
                            <a href="${movie.driveLink}" target="_blank" class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white text-xl hover:bg-white/40">
                                <i class="fa-solid fa-play ml-1"></i>
                            </a>
                        ` : `
                            <button onclick="toggleModal('request', true, '${movie.title}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold">Request Access</button>
                        `}
                    </div>
                    <div class="absolute top-3 left-3 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded">
                        ${movie.genre}
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-bold text-slate-800 truncate pr-2">${movie.title}</h3>
                        <span class="text-slate-400 text-xs">${movie.year}</span>
                    </div>
                    <div class="flex items-center justify-between mt-3">
                        <span class="text-xs text-slate-400">Rating: ${movie.rating || 'N/A'}</span>
                        ${state.isAdmin ? `
                            <button onclick="deleteMovie('${movie.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    };

    window.toggleModal = (type, show, data = '') => {
        const modal = type === 'add' ? addMovieModal : (type === 'login' ? loginModal : requestModal);
        if (show) {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            if (type === 'request' && data) {
                document.getElementById('req-movie-title').value = data;
            }
        } else {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    };

    window.handleLogin = (e) => {
        e.preventDefault();
        const pass = document.getElementById('admin-pass-input').value;
        if (state.isAdmin) {
            state.isAdmin = false;
            sessionStorage.removeItem('isAdmin');
            showFeedback('Logged out of admin mode.');
        } else if (pass === state.adminPassword) {
            state.isAdmin = true;
            sessionStorage.setItem('isAdmin', 'true');
            showFeedback('Welcome Admin!');
            toggleModal('login', false);
        } else {
            showFeedback('Invalid password!', 'error');
        }
        document.getElementById('admin-pass-input').value = '';
        updateAdminUI();
    };

    window.showFeedback = (text, type = 'success') => {
        feedbackMsg.textContent = text;
        feedbackMsg.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-medium shadow-2xl transition-all z-[100] ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
        feedbackMsg.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => feedbackMsg.classList.add('translate-y-20', 'opacity-0'), 3000);
    };

    movieForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!state.isAdmin) return showFeedback('Admin access required', 'error');
        const formData = new FormData(movieForm);
        const movieData = {
            title: formData.get('title'),
            genre: formData.get('genre'),
            year: formData.get('year'),
            driveLink: formData.get('driveLink'),
            posterUrl: formData.get('posterUrl'),
            rating: formData.get('rating'),
            createdAt: Date.now()
        };
        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'movies'), movieData);
            toggleModal('add', false);
            showFeedback('Movie added!');
            movieForm.reset();
        } catch (error) { showFeedback('Save failed', 'error'); }
    };

    window.deleteMovie = async (id) => {
        if (!state.isAdmin) return;
        if (!confirm('Delete this movie?')) return;
        try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id));
            showFeedback('Deleted.');
        } catch (error) { showFeedback('Delete failed', 'error'); }
    };

    searchInput.addEventListener('input', (e) => { state.searchQuery = e.target.value; applyFilters(); });
    genreSelect.addEventListener('change', (e) => { state.genreFilter = e.target.value; applyFilters(); });
    
    window.onload = initAuth;
</script>

<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-clapperboard"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900 leading-none">CineKeep</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">The Biggest Movies Catalog</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="toggleModal('request', true)" class="hidden sm:flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-semibold transition-colors">
                <i class="fa-solid fa-envelope"></i> Request Movie
            </button>
            <button id="login-nav-btn" onclick="toggleModal('login', true)" class="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-700 hover:bg-slate-200 rounded-xl text-sm font-semibold transition-colors">
                <i class="fa-solid fa-lock"></i> Admin
            </button>
            <button id="add-movie-nav-btn" onclick="toggleModal('add', true)" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-semibold text-sm shadow-md flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Add
            </button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Filters -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
        <div class="relative flex-grow">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search-input" placeholder="Search catalog..." class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
        </div>
        <div class="flex gap-4">
            <select id="genre-filter" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl text-slate-700 font-medium outline-none">
                <option value="All">All Genres</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Animation">Animation</option>
            </select>
            <div id="movie-count" class="flex items-center px-6 bg-slate-100 rounded-2xl text-slate-500 font-bold text-sm whitespace-nowrap">0 Movies</div>
        </div>
    </div>

    <!-- Movie Grid -->
    <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
</main>

<!-- Modals -->

<!-- Admin Login Modal -->
<div id="login-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Admin Panel</h2>
        <p class="text-slate-500 text-sm mb-6">Enter password to manage movies.</p>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="password" id="admin-pass-input" placeholder="Password" class="w-full px-4 py-3 border rounded-xl outline-none focus:border-indigo-500">
            <button type="submit" class="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-black transition-colors">Access Panel</button>
            <button type="button" onclick="toggleModal('login', false)" class="w-full text-slate-400 text-sm font-medium">Cancel</button>
        </form>
    </div>
</div>

<!-- Request Movie Modal (Formspree Integration) -->
<div id="request-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Request Movie</h2>
        <p class="text-slate-500 text-sm mb-6">Can't find a movie or need a Pro link? Message the admin.</p>
        <form action="https://formspree.io/f/mgoqepee" method="POST" class="space-y-4" target="_blank" onsubmit="toggleModal('request', false)">
            <!-- Hidden field for your email -->
            <input type="hidden" name="_to" value="udb1psib@anonaddy.me">
            
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-500 ml-1">Your Email</label>
                <input type="email" name="email" required placeholder="your@email.com" class="w-full px-4 py-3 border rounded-xl outline-none focus:border-indigo-500">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-500 ml-1">Movie Title</label>
                <input type="text" id="req-movie-title" name="movie_requested" required placeholder="Name of movie..." class="w-full px-4 py-3 border rounded-xl outline-none focus:border-indigo-500">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-500 ml-1">Message</label>
                <textarea name="message" rows="3" placeholder="Tell the admin what you need..." class="w-full px-4 py-3 border rounded-xl outline-none focus:border-indigo-500 resize-none"></textarea>
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">Send Request</button>
            <button type="button" onclick="toggleModal('request', false)" class="w-full text-slate-400 text-sm font-medium">Close</button>
        </form>
    </div>
</div>

<!-- Add Movie Modal (Admin Only) -->
<div id="add-movie-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="p-6 border-b flex justify-between items-center bg-indigo-50/30">
            <h2 class="font-bold text-slate-800">Add New Movie</h2>
            <button onclick="toggleModal('add', false)" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="movie-form" class="p-6 space-y-4 overflow-y-auto custom-scrollbar">
            <div class="grid grid-cols-2 gap-4">
                <input name="title" required placeholder="Movie Title" class="px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
                <input name="year" type="number" required placeholder="Year" class="px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
                <select name="genre" class="px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                </select>
                <input name="rating" step="0.1" type="number" placeholder="Rating" class="px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
            </div>
            <input name="driveLink" type="url" placeholder="Google Drive Link (Optional)" class="w-full px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
            <input name="posterUrl" type="url" placeholder="Poster Image URL" class="w-full px-4 py-2 border rounded-xl outline-none focus:border-indigo-500">
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl">Add to Catalog</button>
        </form>
    </div>
</div>

<div id="loading-overlay" class="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
</div>

<div id="feedback-message" class="translate-y-20 opacity-0 pointer-events-none"></div>

</body>
</html>
